version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: aegis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aegis_db
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_password
    ports:
      - "5432:5432"
    volumes:
      - aegis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aegis:aegis_password@db:5432/aegis_db
      DATABASE_URL_SYNC: postgresql://aegis:aegis_password@db:5432/aegis_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  aegis_pgdata:
